# Configures `flutter gen-l10n`. ARBs live in lib/l10n; generated Dart lands in
# lib/l10n/generated (excluded from the analyzer, never hand-edited per CLAUDE.md).
arb-dir: lib/l10n
template-arb-file: app_en.arb
output-dir: lib/l10n/generated
output-localization-file: app_localizations.dart
output-class: AppLocalizations
nullable-getter: false
