# flutter gen-l10n configuration. All user-facing copy lives in lib/l10n/*.arb and
# is surfaced through the generated AppLocalizations. The generated Dart is
# gitignored (regenerated by `flutter gen-l10n`, run by the verify gate + pub get).
arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
output-class: AppLocalizations
nullable-getter: false
