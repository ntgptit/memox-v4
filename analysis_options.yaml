# Analyzer config — strict, aligned with the AGENTS.md coding conventions.
# See docs/agent/build/i2-lint-and-format-config.md.
include: package:flutter_lints/flutter.yaml

analyzer:
  plugins:
    - custom_lint            # runs riverpod_lint (Riverpod best-practice checks)
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # riverpod codegen puts annotations on generated targets — silence the noise.
    invalid_annotation_target: ignore
    # conventions promoted to hard errors:
    avoid_print: error                 # use the logger, never print (AGENTS error handling)
    always_declare_return_types: error
  exclude:
    - "**/*.g.dart"
    - "**/*.drift.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # error handling / observability
    avoid_print: true
    unawaited_futures: true
    only_throw_errors: true
    # immutability & control-flow (early return / no needless else style)
    prefer_final_locals: true
    prefer_final_in_for_each: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    # clarity / no magic
    always_declare_return_types: true
    prefer_single_quotes: true
    require_trailing_commas: true
    unnecessary_this: true
    unnecessary_lambdas: true
    use_super_parameters: true
    # imports & structure
    always_use_package_imports: true
    directives_ordering: true
    sort_pub_dependencies: true
