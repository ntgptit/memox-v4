# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# Curated for MemoX. Rules organized by tier — see CLAUDE.md > UI async guard
# contract and the rule-tier rationale documented with the rollout.

include: package:flutter_lints/flutter.yaml

# ---------------------------------------------------------------------------
# riverpod_lint is installed (dev_dependencies) but NOT enabled here yet.
# The version compatible with this toolchain (3.1.3, capped by analyzer ^9 /
# freezed 3.2.5) ships via the experimental analysis_server_plugin, which in
# this SDK has NO working diagnostic suppression: neither `analyzer: errors:`
# (codes report as unrecognized_error_code) nor `// ignore:` comments filter
# its findings. Enabling `plugins: { riverpod_lint: ... }` therefore makes
# `flutter analyze` fail unconditionally — including on an unfixable
# missing_provider_scope false positive in app_bootstrap.dart.
# Re-enable as part of the analyzer ^12 / riverpod 3.3.x / freezed bump
# migration (riverpod_lint 3.1.4+), then verify ignore support before wiring
# it into the gate.
# ---------------------------------------------------------------------------

analyzer:
  # ---------------------------------------------------------------------------
  # Exclude generated / build artifacts. Analyzer is 3-5x faster and noise-free.
  # ---------------------------------------------------------------------------
  exclude:
    - '**/*.g.dart'
    - '**/*.freezed.dart'
    - '**/*.config.dart'
    - '**/*.gr.dart'
    - '**/*.mocks.dart'
    - 'lib/l10n/generated/**'
    - 'build/**'
    - '.dart_tool/**'

  # ---------------------------------------------------------------------------
  # Strict modes (Tier 2). Highest-leverage rules a senior would enable.
  # Catch implicit dynamic, missing type args, and silent casts.
  # If these flood the codebase on first run, comment out one at a time and
  # re-enable incrementally.
  # ---------------------------------------------------------------------------
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  # ---------------------------------------------------------------------------
  # Promote / demote specific diagnostics.
  # ---------------------------------------------------------------------------
  errors:
    # AST-level companion to `memox-ui-async-guard-rules.yaml`.
    # Built-in lint catches `context` / inherited-widget usage after `await`
    # without a `mounted` check (control-flow aware, sees callbacks + closures).
    # The guard handles the snapshot-identity half that this lint cannot.
    use_build_context_synchronously: error

    # Freezed / riverpod_annotation emit annotations targeting fields the
    # analyzer thinks shouldn't accept them. Generated code only.
    invalid_annotation_target: ignore

    # Keep Flutter SDK deprecations visible but not blocking — SDK deprecates
    # APIs faster than we can migrate.
    deprecated_member_use: warning

    # CI hygiene: required + return contracts must hold.
    missing_required_param: error
    missing_return: error

    # TODOs are aspirational; FIXMEs flag real defects.
    todo: ignore
    fixme: warning

linter:
  rules:
    # =========================================================================
    # Tier 1 — Async / Future correctness.
    # CRITICAL for Riverpod 3 + Drift. Fire-and-forget Futures are the worst
    # class of silent bugs in this stack.
    # =========================================================================
    unawaited_futures: true
    discarded_futures: true
    avoid_void_async: true
    await_only_futures: true
    cancel_subscriptions: true
    close_sinks: true
    no_adjacent_strings_in_list: true

    # =========================================================================
    # Tier 3 — Flutter-specific bugs.
    # Sized widgets, decoration shortcuts, container hygiene.
    # =========================================================================
    avoid_unnecessary_containers: true
    sized_box_for_whitespace: true
    sized_box_shrink_expand: true
    use_decorated_box: true
    use_colored_box: true
    use_full_hex_values_for_flutter_colors: true

    # =========================================================================
    # Tier 4 — Modern Dart idioms (Dart 3.x).
    # Most are auto-fixable via `dart fix --apply`.
    # =========================================================================
    use_super_parameters: true
    use_string_in_part_of_directives: true
    unnecessary_late: true
    unnecessary_lambdas: true
    unnecessary_parenthesis: true
    unnecessary_breaks: true
    unnecessary_constructor_name: true
    unnecessary_library_directive: true
    unnecessary_null_aware_assignments: true
    unnecessary_null_checks: true
    unnecessary_statements: true
    unnecessary_string_escapes: true
    unnecessary_string_interpolations: true
    unnecessary_to_list_in_spreads: true
    prefer_void_to_null: true

    # =========================================================================
    # Tier 5 — Final / const discipline (immutable-by-default).
    # =========================================================================
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_locals: true
    prefer_final_in_for_each: true
    prefer_expression_function_bodies: true
    prefer_initializing_formals: true
    prefer_interpolation_to_compose_strings: true

    # =========================================================================
    # Tier 6 — Error handling.
    # Aligns with CLAUDE.md ("UI must not stringify raw errors").
    # =========================================================================
    only_throw_errors: true
    use_rethrow_when_possible: true
    throw_in_finally: true
    avoid_catching_errors: true

    # =========================================================================
    # Tier 9 — Style (selectively enabled — see rule-tier rationale).
    # =========================================================================
    prefer_single_quotes: true
    sort_pub_dependencies: true
    directives_ordering: true
    sort_constructors_first: true
    sort_unnamed_constructors_first: true
