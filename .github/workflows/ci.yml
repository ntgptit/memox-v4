name: CI

# Runs the project's own verification gate (node tool/verify/run.mjs --full):
# doc_guard + flutter analyze + dart format check + the full test suite.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # libsqlite3 is needed by the Drift in-memory tests on the host VM.
      - name: Install sqlite3
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - run: flutter --version

      - name: Resolve dependencies
        run: flutter pub get

      # The single gate. Fails the build on any doc/analyze/format/test problem.
      # Generated files (*.g.dart, l10n) are committed, so no build_runner here.
      - name: Verify
        run: node tool/verify/run.mjs --full
